# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# Run: `flutter analyze`
#
# 정책: 신규 규칙은 단계적으로 추가한다. 기존 코드 전체를 위반하게 만드는 규칙은
# 한 번에 켜지 말고 별도 PR에서 코드 정리와 함께 진행한다.

include: package:flutter_lints/flutter.yaml

analyzer:
  # 생성된 파일은 분석 제외
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - ".dart_tool/**"

linter:
  # flutter_lints 5.0의 기본 규칙에 더해 활성화할 안전한 추가 규칙.
  # 더 엄격한 규칙(prefer_single_quotes, require_trailing_commas,
  # prefer_const_constructors 등)은 점진적으로 추가 예정.
  rules:
    # === 안전성 (메모리 누수/비동기 버그 방지) ===
    - cancel_subscriptions              # StreamSubscription 누수 방지
    - close_sinks                       # Sink 닫기 강제
    - unawaited_futures                 # Future 누락 방지

    # === 가독성 (도메인 디렉토리 import 일관성) ===
    - directives_ordering               # import 순서

    # NOTE: 아래는 다음 PR에서 단계적으로 추가:
    # - prefer_const_constructors
    # - prefer_const_literals_to_create_immutables
    # - prefer_final_fields
    # - prefer_final_locals
    # - prefer_single_quotes
    # - require_trailing_commas
    # - always_declare_return_types
    # - sized_box_for_whitespace
    # - use_key_in_widget_constructors
    # - avoid_dynamic_calls

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
