repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: black (tools)
        files: ^tools/.*\.py$
        language_version: python3.10

  # NOTE: `bash -lc`로 login shell을 띄우면 사용자의 ~/.zshrc /
  # ~/.bashrc가 로드되어 FLUTTER/DART PATH가 반영된다.
  # 이 설정이 없으면 git worktree에서 git push 시 hook이
  # 독립된 PATH에서 실행되어 `flutter`를 찾지 못한다.
  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        entry: bash -lc 'dart format --output=none --set-exit-if-changed "$@"' --
        language: system
        files: \.dart$
      - id: flutter-analyze
        name: flutter analyze
        entry: bash -lc 'flutter analyze'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: flutter-test
        name: flutter test
        entry: bash -lc 'flutter test'
        language: system
        pass_filenames: false
        stages: [pre-push]
