repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # 앱 아이콘 원본 등 이미지 원본은 1~2MB가 일반적이므로 상한 상향.
        args: ['--maxkb=2048']
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: black (tools)
        files: ^tools/.*\.py$
        language_version: python3.10

  # NOTE: macOS 기본 쉘(zsh) login 모드로 띄워 사용자의 ~/.zshrc
  # 또는 ~/.zprofile의 PATH(Flutter/Dart 포함)를 로드한다.
  # 이 설정이 없으면 git worktree에서 git push 시 hook이 제한된 PATH로
  # 실행되어 `flutter`를 찾지 못한다.
  # 사용자가 bash를 쓴다면 `zsh` 부분을 `bash`로 바꾸면 된다.
  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        entry: zsh -lc 'dart format --output=none --set-exit-if-changed "$@"' --
        language: system
        files: \.dart$
      - id: flutter-analyze
        name: flutter analyze
        entry: zsh -lc 'flutter analyze'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: flutter-test
        name: flutter test
        entry: zsh -lc 'flutter test'
        language: system
        pass_filenames: false
        stages: [pre-push]
